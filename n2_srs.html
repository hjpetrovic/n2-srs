<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #100d36; color: #ede8ff; min-height: 100vh; }
  .app { max-width: 800px; margin: 0 auto; padding: 16px; }

  .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1f1d52; margin-bottom: 20px; }
  .header h1 { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #bae6fd, #d8b4fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-stats { display: flex; gap: 16px; font-size: 0.85rem; color: #9388c0; }
  .header-stats span { display: flex; align-items: center; gap: 4px; }

  .user-badge { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 10px; border-radius: 8px; border: 1px solid #353180; background: #1f1d52; }
  .user-badge:hover { border-color: #a855f7; }
  .user-badge img { width: 24px; height: 24px; border-radius: 50%; }
  .user-badge span { font-size: 0.8rem; color: #9388c0; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .nav-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #353180; background: #1f1d52; color: #9388c0; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
  .nav-btn:hover { border-color: #a855f7; color: #e9d5ff; }
  .nav-btn.active { background: #322082; border-color: #a855f7; color: #e9d5ff; }

  .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #1f1d52; border-radius: 12px; padding: 20px; border: 1px solid #353180; }
  .stat-card h3 { font-size: 0.8rem; color: #5f5890; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-card .num { font-size: 2rem; font-weight: 700; }
  .stat-card .sub { font-size: 0.8rem; color: #5f5890; margin-top: 4px; }
  .num-pink { color: #e879f9; } .num-purple { color: #c084fc; }
  .num-green { color: #4ade80; } .num-amber { color: #fbbf24; }

  .progress-bar { height: 6px; background: #1f1d52; border-radius: 3px; overflow: hidden; margin: 8px 0; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .progress-fill.pink { background: linear-gradient(90deg, #d946ef, #e879f9); }
  .progress-fill.purple { background: linear-gradient(90deg, #9333ea, #c084fc); }
  .progress-fill.green { background: linear-gradient(90deg, #16a34a, #4ade80); }

  .card { background: #1f1d52; border-radius: 16px; padding: 32px; border: 1px solid #353180; margin-bottom: 16px; }
  .card-type { font-size: 0.75rem; color: #a855f7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .card-sentence { font-size: 1.5rem; line-height: 2; margin-bottom: 24px; color: #f5f0ff; }

  .target-word { color: #e879f9; text-decoration: underline; text-decoration-color: #e879f9; text-underline-offset: 4px; text-decoration-thickness: 2px; font-weight: 600; }
  .blank-slot { display: inline-block; min-width: 80px; padding: 2px 12px; margin: 0 4px; background: #322082; border: 2px dashed #a855f7; border-radius: 6px; color: #a855f7; text-align: center; font-weight: 600; }
  .blank-slot.filled { background: #052e16; border-color: #4ade80; border-style: solid; color: #4ade80; }
  .blank-slot.filled.wrong { background: #450a0a; border-color: #f87171; color: #f87171; }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-btn { padding: 14px 18px; border-radius: 10px; border: 2px solid #353180; background: #100d36; color: #ede8ff; cursor: pointer; font-size: 1.05rem; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 10px; }
  .option-btn:hover { border-color: #a855f7; background: #271e66; }
  .option-btn .key { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; background: #353180; font-size: 0.8rem; color: #9388c0; flex-shrink: 0; }
  .option-btn.correct { border-color: #4ade80; background: #052e16; }
  .option-btn.correct .key { background: #16a34a; color: white; }
  .option-btn.wrong { border-color: #f87171; background: #450a0a; }
  .option-btn.wrong .key { background: #dc2626; color: white; }
  .option-btn:disabled { cursor: default; }
  .jisho-hint { margin-top: 12px; padding: 10px 14px; background: #1f1d52; border-radius: 8px; border: 1px solid #353180; font-size: 0.9rem; text-align: left; }
  .jisho-hint .definition { color: #9388c0; margin-bottom: 6px; }
  .jisho-hint a { color: #a855f7; text-decoration: none; font-size: 0.82rem; }
  .jisho-hint a:hover { text-decoration: underline; }

  .flashcard { background: #1f1d52; border-radius: 16px; padding: 48px 32px; border: 1px solid #353180; text-align: center; cursor: pointer; transition: all 0.3s; min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .flashcard:hover { border-color: #a855f7; }
  .flashcard .word { font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; }
  .flashcard .reading { font-size: 1.3rem; color: #c084fc; margin-bottom: 8px; }
  .flashcard .meaning { font-size: 1.1rem; color: #9388c0; margin-top: 12px; padding-top: 12px; border-top: 1px solid #353180; font-style: italic; }
  .flashcard .hint { font-size: 0.85rem; color: #3e3870; margin-top: 16px; }

  .rating-btns { display: flex; gap: 8px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
  .rating-btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.15s; }
  .rating-btn:hover { transform: translateY(-1px); }
  .rating-btn.again { background: #dc2626; color: white; }
  .rating-btn.hard { background: #f97316; color: white; }
  .rating-btn.good { background: #16a34a; color: white; }
  .rating-btn.easy { background: #2563eb; color: white; }

  .grammar-card { background: #1f1d52; border-radius: 16px; padding: 32px; border: 1px solid #353180; }
  .grammar-pattern { font-size: 2rem; font-weight: 700; color: #a855f7; margin-bottom: 8px; }
  .grammar-meaning { font-size: 1.1rem; color: #cbd5e1; margin-bottom: 16px; }
  .grammar-connection { font-size: 0.9rem; color: #5f5890; margin-bottom: 20px; padding: 8px 12px; background: #100d36; border-radius: 8px; }
  .grammar-examples { list-style: none; }
  .grammar-examples li { padding: 10px 0; border-bottom: 1px solid #353180; font-size: 1rem; line-height: 1.7; }
  .grammar-examples li:last-child { border-bottom: none; }

  .jisho-link { display: inline-block; margin-top: 16px; color: #a855f7; text-decoration: none; font-size: 1rem; padding: 8px 18px; border: 1px solid #353180; border-radius: 8px; transition: border-color 0.2s; }
  .jisho-link:hover { border-color: #a855f7; }
  .keyboard-hint { text-align: center; color: #3e3870; font-size: 0.8rem; margin-top: 12px; }
  .keyboard-hint kbd { display: inline-block; padding: 2px 6px; border-radius: 4px; background: #353180; color: #9388c0; font-size: 0.75rem; margin: 0 2px; }

  .session-complete { text-align: center; padding: 48px 24px; }
  .session-complete h2 { font-size: 1.8rem; margin-bottom: 12px; }
  .session-complete .emoji { font-size: 3rem; margin-bottom: 16px; }
  .session-complete .stats { color: #9388c0; margin-bottom: 24px; }

  .filter-pills { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .pill { padding: 4px 12px; border-radius: 20px; border: 1px solid #353180; background: transparent; color: #9388c0; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .pill.active { background: #322082; border-color: #a855f7; color: #e9d5ff; }

  .danger-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #dc2626; background: transparent; color: #f87171; cursor: pointer; font-size: 0.85rem; margin-top: 16px; }
  .danger-btn:hover { background: #450a0a; }

  .continue-btn { padding: 10px 32px; border-radius: 8px; border: none; background: #a855f7; color: white; font-size: 1rem; cursor: pointer; font-weight: 600; }
  .continue-btn:hover { background: #6366f1; }

  /* Login screen */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
  .login-screen h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #bae6fd, #d8b4fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .login-screen .subtitle { color: #5f5890; font-size: 1.1rem; margin-bottom: 40px; }
  .login-screen .login-card { background: #1f1d52; border: 1px solid #353180; border-radius: 16px; padding: 40px; max-width: 400px; width: 100%; }
  .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px 24px; border-radius: 10px; border: 2px solid #353180; background: #100d36; color: #ede8ff; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
  .google-btn:hover { border-color: #a855f7; background: #271e66; }
  .google-btn svg { width: 20px; height: 20px; }
  .guest-btn { margin-top: 16px; color: #5f5890; background: none; border: none; cursor: pointer; font-size: 0.85rem; text-decoration: underline; }
  .guest-btn:hover { color: #9388c0; }
  .login-stats { display: flex; gap: 24px; margin-top: 32px; color: #3e3870; font-size: 0.85rem; }
  .login-stats div { text-align: center; }
  .login-stats .n { font-size: 1.3rem; font-weight: 700; color: #a855f7; }

  .sync-indicator { font-size: 0.7rem; color: #3e3870; display: flex; align-items: center; gap: 4px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; }
  .sync-dot.online { background: #4ade80; }
  .sync-dot.offline { background: #f97316; }
  .sync-dot.guest { background: #5f5890; }

  .user-menu { position: relative; }
  .user-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: #1f1d52; border: 1px solid #353180; border-radius: 10px; padding: 8px; min-width: 180px; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .user-dropdown button { display: block; width: 100%; padding: 8px 12px; border: none; background: none; color: #9388c0; cursor: pointer; font-size: 0.85rem; text-align: left; border-radius: 6px; }
  .user-dropdown button:hover { background: #353180; color: #ede8ff; }

  .setup-banner { background: #322082; border: 1px solid #a855f7; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; }
  .setup-banner p { color: #e9d5ff; font-size: 0.85rem; line-height: 1.6; }
  .setup-banner code { background: #271e66; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; color: #ede8ff; }

  @media (max-width: 600px) {
    .options { grid-template-columns: 1fr; }
    .card-sentence { font-size: 1.2rem; }
    .flashcard .word { font-size: 2rem; }
    .header-stats { gap: 8px; }
    .login-screen h1 { font-size: 2.2rem; }
    .login-stats { gap: 16px; }
  }
</style>

"},{"word":"ご覧になる","reading":"ごらんになる","en":"to see; to look; to watch"},{"word":"先ほど","reading":"さきほど","en":"a short while ago; a moment ago; just now; some time ago"},{"word":"大変失礼いたしました","reading":"たいへんしつれいいたしました","en":"very; greatly; terribly; awfully"},{"word":"弊社","reading":"へいしゃ","en":"our company; our firm"},{"word":"参る","reading":"まいる","en":"to go; to come; to call"},{"word":"召し上がる","reading":"めしあがる","en":"to eat; to drink"},{"word":"申し上げる","reading":"もうしあげる","en":"to say; to tell; to state; to express; to offer; to extend (greetings, congratulations, etc.)"}],"grammar":[{"id":1,"pattern":"～もの ①","meaning":"誰でも〜だと思う（当然のことや、変わらない事実を言うときに使う）","connection":"Vる / Vない＋もの / もん 緊張するものだ / うまくいかないものだ / やるもんだ","examples":["誰でも最初は失敗するものだから、そんなに落ち込まないで。","どんなに長い夜でも、必ず明けるものだ。"]},{"id":2,"pattern":"～もの ②","meaning":"〜べきだ","connection":"Vる / Vない＋もの / もん Vる＋ものではない / もんではない / ものじゃない / もんじゃない 静かにするものだ / 敬語を使うもんだ / 馬鹿にするものではない","examples":["根拠のないうわさ話を、簡単に信用するものではない。","電車の中では、他人に迷惑がかかるから電話にでないだ。"]},{"id":3,"pattern":"～もの ③","meaning":"〜だなあ（気持ちを込めて何かを言いたいときに使う） ※Nは使えない","connection":"普通形（ナAだ → な）＋もの / もん よく遊んだものだ / 困ったものだ / うれしいもんだ","examples":["若かったころは、友達と朝までお酒を飲んで語り合ったものだ。","","人からプレゼントをもらうのはうれしいものだ。"]},{"id":4,"pattern":"～というものだ","meaning":"","connection":"N＋というものだ / というもんだ 親というものだ / 幸せというものだ / 親友というもんだ","examples":["つらいときこそ助け合うのが、本当の仲間というものだ。","良いことも悪いこともあるのが、人生というものだ。","明日までに一万字のレポートを書くのは不可能。"]},{"id":5,"pattern":"～というものではない","meaning":"絶対に〜だと言えない","connection":"普通形＋というものではない / というもんではない 普通形＋というものでもない / というもんでもない うまくいくというものではない / おいしいというもんではない / いい人だというものでもない","examples":["努力すれば、必ず試験に合格できるというものではない。"]},{"id":6,"pattern":"～ものがある","meaning":"〜という感じがする","connection":"Vる / イA / ナAな＋ものがある 心に響くものがある / 寂しいものがある / 不思議なものがある 1 犯行後の彼らの行動には、どこか不自然なものがあります。 2 彼の歌声には、人の心を動かすものがある。","examples":["","","この歳で独身に戻るのは、つらい。"]},{"id":7,"pattern":"～ものの","meaning":"〜けれども","connection":"普通形（ナAだ → な・である）＋ものの 普通形 / N ＋とはいうものの 買ったものの / 有名であるものの / 合格したとはいうものの 1 日本語を勉強したものの、話す相手がいないのですっかり忘れてしまった。","examples":["","体に悪いとわかっているものの、夜中にカップラーメンを食べてしまう。","夏休みとはいう、毎日課題や家の手伝いで忙しい。"]},{"id":8,"pattern":"～ものなら","meaning":"できないと思うけど、もし〜できるなら","connection":"Vれる＋ものなら / もんなら 休めるものなら / なれるもんなら / ★できるものなら","examples":["行けるもんなら、今すぐ恋人に会いに行きたい。","","祖母が生きていたころに戻れるものなら、今すぐ戻ってありがとうと伝えたい。"]},{"id":9,"pattern":"～ものか","meaning":"絶対に〜ない","connection":"Vる / イA / ナAな / Nな＋ものか / もんか 負けるものか / つらいものか / 諦めるもんか","examples":["仕事をさぼって給料だけもらうなんてことが、この社会で許されるものか。","田中「加藤さんて、ピーマンが好きだよね？」"]},{"id":10,"pattern":"～ものと思われる","meaning":"〜だと推測できる","connection":"Vた＋ものと思われる 買ったものと思われる / 知らなかったものと思われる / 行ったものと思われる","examples":["犯人はたった一時間で犯行に及んだものと思われる。","キツネが侵入した足跡が、荒された畑の中にあった。"]},{"id":11,"pattern":"～ことに","meaning":"","connection":"Vた / ナAな / イA＋ことに 困ったことに / 幸いなことに / うれしいことに","examples":["悲しいことに、新しく買ったばかりの口紅をなくしてしまった。","驚いた、普通は3日かかる仕事を彼は1日で完璧にやり終えてしまった。"]},{"id":12,"pattern":"～ことにする","meaning":"本当はそうじゃないけど、〜というふりをする","connection":"Vた＋ことにする やったことにする / 行ったことにする / 知らなかったことにする","examples":["姉が作ったお弁当を、自分が作ったことにして恋人にプレゼントした。","","宿題を終わらせたことにして遊びに行ったら、お母さんに叱られた。"]},{"id":13,"pattern":"～ことか","meaning":"本当に〜だ（気持ちを強く言いたいときに使う） ※「どんなに / どれだけ / どれほど〜ことか」という言い方が多い","connection":"普通形（ナAだ → な・である / Nだ → である）＋ことか どんなに苦しかったことか / どれだけうれしいことか / どれほど幸せなことか","examples":["どんなときでも明るい笑顔を見せる彼女に、どれほど救われていることか。","今までお腹の中にいた息子の顔を初めてみたとき、どんなにうれしかったことか。","大事な試合前にけがをしてしまって、どれだけつらかった。"]},{"id":14,"pattern":"～ことから","meaning":"〜だから","connection":"普通形（ナAだ → な・である / Nだ  → である ）＋ことから 見つかったことから / 知っていることから / 有名であることから 1 この通りにあるお菓子屋さんはどれも有名であることから、ここは「スイーツスト リート」と呼ばれている。 2 まだ足跡が雪の上にはっきりと残っていることから、熊はまだ近くにいると考えら れる。 栄養のバランスが良いことから、和食がまた注目を集めるようになった。 JLPT N2 この一冊で合格する","examples":[]},{"id":15,"pattern":"～のことだから","meaning":"〜の性格を考えると","connection":"N＋のことだから 彼のことだから / 村上さんのことだから / あいつのことだから","examples":["いつも寝坊する彼女のことだから、今日もデートに遅刻してくるだろう。","母のことだから、私を元気にさせるためにお弁当に大好物の卵焼きをたくさん入れて","田中「どうしよう。森くんのペン壊しちゃった。」"]},{"id":16,"pattern":"～ことなく","meaning":"〜しないで","connection":"Vる＋ことなく 休むことなく / 迷うことなく / 満足することなく","examples":["工場では24時間、止まることなく機械が動き続けている。","私の親友は、毎年忘 って / 急いでいるときに限って / そういう日に限って","examples":["静かにしなければいけないときに限って、お腹が鳴ってしまう。","白い服を着ている日に限って、コーヒーをこぼしてしまう。"]},{"id":27,"pattern":"～に限って～ない","meaning":"〜がそんなことをするなんて、信じられない！ありえない！","connection":"N＋に限って〜ない 彼に限って / 先生に限って / うちの子に限って まじめな彼女、学校をさぼって友達と遊ぶなんてあり得。","examples":["に限ってない","","優しい息子に限って、友達を泣かせるはずがない。"]},{"id":28,"pattern":"～とは限らない","meaning":"100%〜だと言えない","connection":"普通形＋とは限らない 合格するとは限らない / おいしいとは限らない / 真実だとは限らない","examples":["お金をたくさん持っている人が、みんな幸せだとは限らない。","努力をすれば必ず成功するとは限らないが、努力をしなければ成功しない。"]},{"id":29,"pattern":"～だけあって","meaning":"〜だから（ほめるときによく使う）","connection":"普通形（ナAだ → な / Nだ）＋だけあって 勉強しただけあって / 有名なだけあって / 日本語の先生だけあって","examples":["日本に留学しただけあって、彼は日本の文化についてとても詳しい。","テレビで紹介されるほど有名なだけあって、このラーメン屋さんはいつも行列がで"]},{"id":30,"pattern":"～だけに","meaning":"①〜だから当然（＝〜だけあって） ※Vるは使えない","connection":"普通形（ナAだ → な・である / Nだ → である）＋だけに 心配していただけに / 美人であるだけに / 安いだけに","examples":["失敗が続いていた、今回の実験成功は心の底からうれしい。","","彼は若者の間で有名なだけに、街を歩くだけで声をかけられて大変だ。"]},{"id":31,"pattern":"～からには / ～以上","meaning":"〜だから！（強い気持ちを表す）","connection":"Vる / Vた＋からには / 以上（は） ナA / N＋ であるからには / である以上（は） 留学するからには / お金を払ったからには / 先生である以上 1 最初はやりたくなかったが、やるからには本気で取り組みたいと思っている。","examples":["","雨が降っているが、ここまで来たからには観光名所を見てから帰ろう。","上司である以上、部下のミスであっても責任を取らなければならない。"]},{"id":32,"pattern":"～というだけで","meaning":"〜という理由だけで","connection":"普通形＋というだけで ナA / N ＋（である）というだけで 英語が話せるというだけで / 若いというだけで / お金持ちというだけで 1 あの店が販売している商品だというだけで、品質が悪いのに高い値段で売られて いる。 2 芸能人が来たというだけで、あのレストランは次の日から行列ができたそうだ。 彼女はかわいいというだけで、色々な会社の面接に合格した。 JLPT N2 この一冊で合格する 逆接","examples":[]},{"id":33,"pattern":"～にもかかわらず","meaning":"〜なのに","connection":"普通形（ナAだ → である / N だ → である）＋にもかかわらず N＋にもかかわらず 真冬にもかかわらず / 上司であるにもかかわらず / 努力したにもかかわらず","examples":["彼はお金持ちであるにもかかわらず、値段の高いものを一切買わない。","こんなに暑い、彼は長袖のトレーナーを着ている。","雨にもかかわらず、新発売のゲームを買いに来たお客さんで長い列ができています。"]},{"id":34,"pattern":"～にしては","meaning":"〜から予想することとは違う","connection":"普通形（ナAだ → である / Nだ）＋にしては 初めて作ったにしては / 私にしては / この値段にしては","examples":["彼の作った資料にはいくつかミスがあったが、新入社員にしてはよくできている方","","私の父は見た目に気を使っているので、50代にしては若く見える。"]},{"id":35,"pattern" <script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// Access globals from non-babel script block
const FIREBASE_CONFIG = window.FIREBASE_CONFIG;
const FIREBASE_CONFIGURED = window.FIREBASE_CONFIGURED;
const db = window.db;
const auth = window.auth;

// SM-2 Algorithm
function sm2(card, quality) {
  if (quality < 0 || quality > 3) quality = 0;
  const q = [0, 2, 3, 5][quality];
  let { ef, interval, repetitions } = card;
  ef = ef || 2.5; interval = interval || 0; repetitions = repetitions || 0;

  if (q < 3) { repetitions = 0; interval = 1; }
  else {
    if (repetitions === 0) interval = 1;
    else if (repetitions === 1) interval = 3;
    else interval = Math.round(interval * ef);
    repetitions++;
  }
  ef = Math.max(1.3, ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
  const now = Date.now();
  return { ef, interval, repetitions, nextReview: now + interval * 86400000, lastReviewed: now, lastQuality: quality };
}

// ===== DATA PERSISTENCE LAYER =====
// Abstracts localStorage (guest) vs Firestore (signed in)

function useDataStore(user) {
  const [progress, setProgress] = useState({});
  const [stats, setStats] = useState({ totalReviews: 0, streak: 0, lastStudyDate: null, correctCount: 0, byType: {}, recentResults: [] });
  const [loaded, setLoaded] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const saveTimer = useRef(null);
  const pendingProgress = useRef(null);
  const pendingStats = useRef(null);

  // Load data on mount or user change
  useEffect(() => {
    setLoaded(false);
    if (user && db) {
      // Load from Firestore
      const uid = user.uid;
      Promise.all([
        db.collection('users').doc(uid).collection('n2-data').doc('progress').get(),
        db.collection('users').doc(uid).collection('n2-data').doc('stats').get()
      ]).then(([pSnap, sSnap]) => {
        if (pSnap.exists) setProgress(pSnap.data().cards || {});
        else setProgress({});
        if (sSnap.exists) {
          const s = sSnap.data();
          setStats({ totalReviews: s.totalReviews || 0, streak: s.streak || 0, lastStudyDate: s.lastStudyDate || null, correctCount: s.correctCount || 0, byType: s.byType || {}, recentResults: s.recentResults || [] });
        } else {
          setStats({ totalReviews: 0, streak: 0, lastStudyDate: null, correctCount: 0, byType: {}, recentResults: [] });
        }
        setLoaded(true);
        // Update profile
        db.collection('users').doc(uid).set({
          displayName: user.displayName || 'Anonymous',
          photoURL: user.photoURL || null,
          lastActive: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      }).catch(() => {
        // Offline — Firestore persistence will serve cached data
        setLoaded(true);
      });
    } else {
      // Guest mode — use localStorage
      try { setProgress(JSON.parse(localStorage.getItem('n2_srs_v2') || '{}')); } catch { setProgress({}); }
      try {
        const s = JSON.parse(localStorage.getItem('n2_stats_v2') || '{}');
        setStats({ totalReviews: s.totalReviews || 0, streak: s.streak || 0, lastStudyDate: s.lastStudyDate || null, correctCount: s.correctCount || 0, recentResults: s.recentResults || [] });
      } catch { setStats({ totalReviews: 0, streak: 0, lastStudyDate: null, correctCount: 0, byType: {}, recentResults: [] }); }
      setLoaded(true);
    }
  }, [user]);

  // Debounced save to Firestore (batch writes every 2s)
  function scheduleSave() {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      if (user && db) {
        const uid = user.uid;
        setSyncing(true);
        const batch = db.batch();
        if (pendingProgress.current) {
          batch.set(db.collection('users').doc(uid).collection('n2-data').doc('progress'), { cards: pendingProgress.current }, { merge: true });
        }
        if (pendingStats.current) {
          batch.set(db.collection('users').doc(uid).collection('n2-data').doc('stats'), pendingStats.current, { merge: true });
        }
        batch.commit().then(() => setSyncing(false)).catch(() => setSyncing(false));
      }
    }, 2000);
  }

  function updateProgress(newProgress) {
    setProgress(newProgress);
    if (user && db) {
      pendingProgress.current = newProgress;
      scheduleSave();
    } else {
      try { localStorage.setItem('n2_srs_v2', JSON.stringify(newProgress)); } catch {}
    }
  }

  function updateStats(newStats) {
    setStats(newStats);
    if (user && db) {
      pendingStats.current = newStats;
      scheduleSave();
    } else {
      try { localStorage.setItem('n2_stats_v2', JSON.stringify(newStats)); } catch {}
    }
  }

  function resetAll() {
    setProgress({});
    setStats({ totalReviews: 0, streak: 0, lastStudyDate: null, correctCount: 0, byType: {}, recentResults: [] });
    if (user && db) {
      const uid = user.uid;
      db.collection('users').doc(uid).collection('n2-data').doc('progress').delete();
      db.collection('users').doc(uid).collection('n2-data').doc('stats').delete();
    } else {
      localStorage.removeItem('n2_srs_v2');
      localStorage.removeItem('n2_stats_v2');
    }
  }

  return { progress, stats, loaded, syncing, updateProgress, updateStats, resetAll };
}

const TYPE_LABELS = { kanji_reading: '漢字読み', vocabulary: '語彙', synonym: '類義語', usage: '用法', grammar: '文法', mixed: '総合' };

// Render sentence with highlighted target word or blank
function SentenceDisplay({ sentence, target, selected, card, isCorrect }) {
  if (target && sentence.includes(target)) {
    const parts = sentence.split(target);
    return (
      <div className="card-sentence">
        {parts[0]}<span className="target-word">{target}</span>{parts.slice(1).join(target)}
      </div>
    );
  }

  if (sentence.includes('（') && sentence.includes('）')) {
    const blankMatch = sentence.match(/（[^）]*）/);
    if (blankMatch) {
      const idx = sentence.indexOf(blankMatch[0]);
      const before = sentence.substring(0, idx);
      const after = sentence.substring(idx + blankMatch[0].length);

      let blankContent = '？';
      let blankClass = 'blank-slot';
      if (selected !== null && card) {
        blankContent = card.options[card.correct];
        blankClass += isCorrect ? ' filled' : ' filled wrong';
      }

      return (
        <div className="card-sentence">
          {before}<span className={blankClass}>{blankContent}</span>{after}
        </div>
      );
    }
  }

  return <div className="card-sentence">{sentence}</div>;
}

function LoginScreen({ onLogin, onGuest }) {

    <div className="app">
      <div className="login-screen">
        <h1>N2 SRS</h1>
        <div className="subtitle">Spaced repetition for JLPT N2</div>
        <div className="login-card">
          {FIREBASE_CONFIGURED ? (
            <>
              <button className="google-btn" onClick={onLogin}>
                <GoogleIcon /> Sign in with Google
              </button>
              <button className="guest-btn" onClick={onGuest}>Continue as guest</button>
            </>
          ) : (
            <>
              <button className="google-btn" onClick={onGuest}>
                Start Studying
              </button>
              <p style={{color:'#5f5890',fontSize:'0.8rem',marginTop:16}}>
                Cloud sync not configured. Progress saves locally.<br/>
                See SETUP.md for Firebase setup instructions.
              </p>
            </>
          )}
        </div>
        <div className="login-stats">
          <div><div className="n">{N2_DATA.questions.length}</div>questions</div>
          <div><div className="n">{N2_DATA.vocabulary.length}</div>vocab</div>
          <div><div className="n">{N2_DATA.grammar.length}</div>grammar</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null); // null = not logged in, {uid, displayName, photoURL} or 'guest'
  const [authChecked, setAuthChecked] = useState(false);
  const [showUserMenu, setShowUserMenu] = useState(false);

  const isGuest = user === 'guest';
  const firebaseUser = (!isGuest && user) ? user : null;
  const { progress, stats, loaded, syncing, updateProgress, updateStats, resetAll } = useDataStore(firebaseUser);

  const [view, setView] = useState('dashboard');
  const [sessionCards, setSessionCards] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [flipped, setFlipped] = useState(false);
  const [sessionStats, setSessionStats] = useState({ correct: 0, total: 0 });
  const [batchSize, setBatchSize] = useState(20);
  const [activeTypes, setActiveTypes] = useState(new Set(['kanji_reading', 'vocabulary', 'mixed']));
  const [lastReviewSnapshot, setLastReviewSnapshot] = useState(null);
  const [requeuedIds, setRequeuedIds] = useState(new Set());
  const [shuffledOptions, setShuffledOptions] = useState({ options: [], correctIdx: 0 });
  const [jishoMeaning, setJishoMeaning] = useState(null); // null=idle, 'loading', ''=no result, or definition string

  // true when running inside the Android WebView wrapper
  const isAndroidApp = navigator.userAgent.includes('N2SRS-Android');

  // Check auth state on mount; also complete any pending signInWithRedirect
  // (the Android app uses redirect instead of popup to avoid Google's WebView block)
  useEffect(() => {
    if (auth) {
      if (isAndroidApp) {
        auth.getRedirectResult().catch(err => console.error('Redirect result:', err));
      }
      const unsub = auth.onAuthStateChanged(u => {
        if (u) setUser(u);
        setAuthChecked(true);
      });
      return () => unsub();
    } else {
      setAuthChecked(true);
    }
  }, []);

  // Close menu on outside click
  useEffect(() => {
    if (!showUserMenu) return;
    function close(e) { setShowUserMenu(false); }
    window.addEventListener('click', close);
    return () => window.removeEventListener('click', close);
  }, [showUserMenu]);

  function handleGoogleLogin() {
    if (!auth) return;
    const provider = new firebase.auth.GoogleAuthProvider();
    // Android WebView can't handle OAuth popups (Google blocks them);
    // use redirect instead — getRedirectResult() above completes the flow on return.
    if (isAndroidApp) {
      auth.signInWithRedirect(provider);
      return;
    }
    auth.signInWithPopup(provider).then(result => {
      setUser(result.user);
    }).catch(err => {
      console.error('Login failed:', err);
      // If popup blocked, try redirect
      if (err.code === 'auth/popup-blocked') {
        auth.signInWithRedirect(provider);
      }
    });
  }

  function handleSignOut() {
    if (auth) auth.signOut();
    setUser(null);
    setView('dashboard');
    setShowUserMenu(false);
  }

  const questions = N2_DATA.questions;
  const vocabulary = N2_DATA.vocabulary;
  const grammarList = N2_DATA.grammar;
  const now = Date.now();

  // reviewDue = cards already studied whose nextReview date has passed (genuine overdue)
  // newCards  = cards never studied yet
  // Sessions fill with reviewDue first, then top up with newCards
  const reviewDue = useMemo(() => questions.filter(q => {
    if (!activeTypes.has(q.type)) return false;
    const p = progress[`q_${q.id}`];
    return p && p.nextReview <= now;
  }), [progress, activeTypes]);

  const newCards = useMemo(() => questions.filter(q => activeTypes.has(q.type) && !progress[`q_${q.id}`]), [progress, activeTypes]);
  const studiedCount = Object.keys(progress).filter(k => k.startsWith('q_')).length;

  const vocabReviewDue = useMemo(() => vocabulary.filter(v => {
    const p = progress[`v_${v.word}`];
    return p && p.nextReview <= now;
  }), [progress]);
  const newVocab = useMemo(() => vocabulary.filter(v => !progress[`v_${v.word}`]), [progress]);

  const grammarReviewDue = useMemo(() => grammarList.filter(g => {
    const p = progress[`g_${g.id}`];
    return p && p.nextReview <= now;
  }), [progress]);
  const newGrammar = useMemo(() => grammarList.filter(g => !progress[`g_${g.id}`]), [progress]);

  const grammarMcqQuestions = useMemo(() => N2_DATA.questions.filter(q => q.type === 'grammar_mcq'), []);
  const grammarMcqReviewDue = useMemo(() => grammarMcqQuestions.filter(q => {
    const p = progress[`q_${q.id}`];
    return p && p.nextReview <= now;
  }), [progress, grammarMcqQuestions]);
  const newGrammarMcq = useMemo(() => grammarMcqQuestions.filter(q => !progress[`q_${q.id}`]), [progress, grammarMcqQuestions]);

  const recentResults = stats.recentResults || [];
  const accuracy = recentResults.length > 0 ? Math.round(recentResults.reduce((a, b) => a + b, 0) / recentResults.length * 100) : 0;

  // Update streak
  useEffect(() => {
    if (sessionStats.total > 0) {
      const today = new Date().toISOString().slice(0, 10);
      if (stats.lastStudyDate !== today) {
        const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
        const newStreak = stats.lastStudyDate === yesterday ? stats.streak + 1 : 1;
        updateStats({ ...stats, streak: newStreak, lastStudyDate: today });
      }
    }
  }, [sessionStats.total]);

  // Keyboard
  useEffect(() => {
    function handleKey(e) {
      if (view === 'quiz' && sessionCards[currentIdx]) {
        if (selected === null && '1234'.includes(e.key)) handleAnswer(+e.key - 1);
        else if (selected !== null && (e.key === ' ' || e.key === 'Enter')) { e.preventDefault(); nextCard(); }
      } else if (view === 'vocab') {
        if (e.key === ' ') { e.preventDefault(); setFlipped(f => !f); }
        else if (flipped && '1234'.includes(e.key)) handleVocabRating(+e.key - 1);
      } else if (view === 'grammar') {
        if (!flipped && (e.key === ' ' || e.key === 'Enter')) { e.preventDefault(); setFlipped(true); }
        else if (flipped && '1234'.includes(e.key)) handleGrammarRating(+e.key - 1);
      }
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [view, selected, currentIdx, sessionCards, flipped]);

  // Shuffle answer options each time a new quiz card is shown.
  // Guard on selected === null so that re-queuing a wrong card (which updates
  // sessionCards) does not trigger a re-shuffle while an answer is displayed.
  useEffect(() => {
    if (view === 'quiz' && sessionCards[currentIdx] && selected === null) {
      const card = sessionCards[currentIdx];
      const shuffled = [...card.options.map((_, i) => i)].sort(() => Math.random() - 0.5);
      setShuffledOptions({
        options: shuffled.map(i => card.options[i]),
        correctIdx: shuffled.indexOf(card.correct)
      });
    }
  }, [currentIdx, sessionCards, view, selected]);

  // Fetch Jisho definition when a kanji/vocab answer is wrong
  useEffect(() => {
    if (selected === null || view !== 'quiz') return;
    const card = sessionCards[currentIdx];
    if (!card || selected === shuffledOptions.correctIdx) return;
    if (card.type !== 'kanji_reading' && card.type !== 'vocabulary') return;
    const word = card.type === 'kanji_reading' ? card.target : card.options[card.correct];
    if (!word) return;
    setJishoMeaning('loading');
    fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(word)}`)
      .then(r => r.json())
      .then(data => {
        const defs = data?.data?.[0]?.senses?.[0]?.english_definitions;
        setJishoMeaning(defs?.length ? defs.join('; ') : '');
      })
      .catch(() => setJishoMeaning(''));
  }, [selected]);

  function buildSessionPool(reviews, newC) {
    // Always clear overdue reviews first; fill remaining slots with new cards
    const reviewSlice = reviews.slice(0, batchSize);
    const newSlice = newC.slice(0, batchSize - reviewSlice.length);
    const pool = [...reviewSlice, ...newSlice];
    return pool.length ? pool : newC.slice(0, batchSize);
  }

  function startQuiz(mode) {
    const pool = mode === 'new' ? newCards.slice(0, batchSize) : buildSessionPool(reviewDue, newCards);
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    if (!shuffled.length) return;
    setSessionCards(shuffled); setCurrentIdx(0); setSelected(null);
    setSessionStats({ correct: 0, total: 0 }); setRequeuedIds(new Set()); setView('quiz');
  }

  function handleAnswer(idx) {
    if (selected !== null) return;
    setSelected(idx);
    const card = sessionCards[currentIdx];
    const isCorrect = idx === shuffledOptions.correctIdx;
    const key = `q_${card.id}`;
    setLastReviewSnapshot({ key, prevProgress: progress[key], prevStats: stats, prevSessionStats: sessionStats });
    const updated = sm2(progress[key] || {}, isCorrect ? 2 : 0);
    const np = { ...progress, [key]: updated };
    updateProgress(np);
    let ns = { ...stats, totalReviews: stats.totalReviews + 1, correctCount: stats.correctCount + (isCorrect ? 1 : 0), recentResults: [...(stats.recentResults || []), isCorrect ? 1 : 0].slice(-100) };
    ns = addTypeStats(ns, card.type, isCorrect);
    updateStats(ns);
    setSessionStats(s => ({ correct: s.correct + (isCorrect ? 1 : 0), total: s.total + 1 }));
    // Re-queue failed cards once at end of session so they're consolidated before tomorrow
    if (!isCorrect && !requeuedIds.has(card.id)) {
      setSessionCards(cards => [...cards, card]);
      setRequeuedIds(ids => new Set([...ids, card.id]));
    }
  }

  function nextCard() {
    setLastReviewSnapshot(null);
    setJishoMeaning(null);
    if (currentIdx + 1 >= sessionCards.length) setView('session_complete');
    else { setCurrentIdx(i => i + 1); setSelected(null); }
  }

  function startVocab() {
    const pool = buildSessionPool(vocabReviewDue, newVocab);
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    if (!shuffled.length) return;
    setSessionCards(shuffled); setCurrentIdx(0); setFlipped(false);
    setSessionStats({ correct: 0, total: 0 }); setView('vocab');
  }

  function handleVocabRating(q) {
    if (!flipped) return;
    const card = sessionCards[currentIdx];
    const key = `v_${card.word}`;
    const updated = sm2(progress[key] || {}, q);
    const np = { ...progress, [key]: updated };
    updateProgress(np);
    const isCorrect = q >= 2;
    let ns = { ...stats, totalReviews: stats.totalReviews + 1, correctCount: stats.correctCount + (isCorrect ? 1 : 0), recentResults: [...(stats.recentResults || []), isCorrect ? 1 : 0].slice(-100) };
    ns = addTypeStats(ns, 'vocab', isCorrect);
    updateStats(ns);
    setSessionStats(s => ({ correct: s.correct + (isCorrect ? 1 : 0), total: s.total + 1 }));
    if (currentIdx + 1 >= sessionCards.length) setView('session_complete');
    else { setCurrentIdx(i => i + 1); setFlipped(false); }
  }

  function startGrammar() {
    const pool = buildSessionPool(grammarReviewDue, newGrammar);
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    if (!shuffled.length) return;
    setSessionCards(shuffled); setCurrentIdx(0); setFlipped(false);
    setSessionStats({ correct: 0, total: 0 }); setView('grammar');
  }

  function startGrammarMcq() {
    const pool = buildSessionPool(grammarMcqReviewDue, newGrammarMcq);
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    if (!shuffled.length) return;
    setSessionCards(shuffled); setCurrentIdx(0); setSelected(null);
    setSessionStats({ correct: 0, total: 0 }); setRequeuedIds(new Set()); setView('quiz');
  }

  function handleGrammarRating(q) {
    const card = sessionCards[currentIdx];
    const key = `g_${card.id}`;
    const updated = sm2(progress[key] || {}, q);
    const np = { ...progress, [key]: updated };
    updateProgress(np);
    const isCorrect = q >= 2;
    let ns = { ...stats, totalReviews: stats.totalReviews + 1, correctCount: stats.correctCount + (isCorrect ? 1 : 0), recentResults: [...(stats.recentResults || []), isCorrect ? 1 : 0].slice(-100) };
    ns = addTypeStats(ns, 'grammar_pattern', isCorrect);
    updateStats(ns);
    setSessionStats(s => ({ correct: s.correct + (isCorrect ? 1 : 0), total: s.total + 1 }));
    if (currentIdx + 1 >= sessionCards.length) setView('session_complete');
    else { setCurrentIdx(i => i + 1); setFlipped(false); }
  }

  function resetProgress() {
    if (confirm('Reset all progress? This cannot be undone.')) {
      resetAll();
    }
  }

  function addTypeStats(ns, type, isCorrect) {
    const prev = (ns.byType || {})[type] || { reviews: 0, correct: 0 };
    return { ...ns, byType: { ...(ns.byType || {}), [type]: { reviews: prev.reviews + 1, correct: prev.correct + (isCorrect ? 1 : 0) } } };
  }

  function undoReview() {
    if (!lastReviewSnapshot) return;
    const { key, prevProgress, prevStats, prevSessionStats } = lastReviewSnapshot;
    const np = { ...progress };
    if (prevProgress === undefined) delete np[key];
    else np[key] = prevProgress;
    updateProgress(np);
    updateStats(prevStats);
    setSessionStats(prevSessionStats);
    setSelected(null);
    setLastReviewSnapshot(null);
  }

  // Show loading while checking auth or loading data
  if (!authChecked) {
    return <div className="app" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'80vh'}}>
      <div style={{textAlign:'center',color:'#5f5890'}}>Loading...</div>
    </div>;
  }

  // Show login if no user
  if (!user) {
    return <LoginScreen onLogin={handleGoogleLogin} onGuest={() => setUser('guest')} />;
  }

  // Show loading while data loads
  if (!loaded) {
    return <div className="app" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'80vh'}}>
      <div style={{textAlign:'center',color:'#5f5890'}}>Loading your progress...</div>
    </div>;
  }

  const displayName = isGuest ? 'Guest' : (user.displayName || 'User');
  const photoURL = isGuest ? null : user.photoURL;

  return (
    <div className="app">
      <div className="header">
        <h1>N2 SRS</h1>
        <div className="header-stats">
          {stats.streak > 0 && <span style={{color:'#f97316'}}>&#x1F525; {stats.streak}日</span>}
          <span>{stats.totalReviews} reviews</span>
          <div className="sync-indicator">
            <span className={`sync-dot ${isGuest ? 'guest' : syncing ? 'offline' : 'online'}`}></span>
            {isGuest ? 'local' : syncing ? 'saving...' : 'synced'}
          </div>
          <div className="user-menu">
            <button className="user-badge" onClick={(e) => { e.stopPropagation(); setShowUserMenu(m => !m); }}>
              {photoURL ? <img src={photoURL} alt="" referrerPolicy="no-referrer" /> : <span style={{fontSize:'1rem'}}>👤</span>}
              <span>{displayName}</span>
            </button>
            {showUserMenu && (
              <div className="user-dropdown" onClick={e => e.stopPropagation()}>
                <div style={{padding:'8px 12px',borderBottom:'1px solid #353180',marginBottom:4}}>
                  <div style={{color:'#ede8ff',fontWeight:600,fontSize:'0.9rem'}}>{displayName}</div>
                  <div style={{color:'#5f5890',fontSize:'0.75rem'}}>{isGuest ? 'Guest mode' : user.email}</div>
                </div>
                {isGuest && FIREBASE_CONFIGURED && (
                  <button onClick={() => { setShowUserMenu(false); handleGoogleLogin(); }}>Sign in to sync</button>
                )}
                <button onClick={() => { setShowUserMenu(false); resetProgress(); }}>Reset progress</button>
                <button onClick={handleSignOut}>{isGuest ? 'Back to login' : 'Sign out'}</button>
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="nav">
        <button className={`nav-btn ${view === 'dashboard' ? 'active' : ''}`} onClick={() => setView('dashboard')}>Dashboard</button>
        <button className={`nav-btn ${view === 'quiz' ? 'active' : ''}`} onClick={() => startQuiz('due')}>Study Due ({reviewDue.length})</button>
        <button className="nav-btn" onClick={() => startQuiz('new')}>New Cards</button>
        <button className={`nav-btn ${view === 'vocab' ? 'active' : ''}`} onClick={startVocab}>Vocab ({vocabReviewDue.length})</button>
        <button className={`nav-btn ${view === 'grammar' ? 'active' : ''}`} onClick={startGrammar}>Grammar ({grammarReviewDue.length})</button>

      </div>
      <p style={{fontSize:'0.75rem',color:'#3e3870',marginTop:-12,marginBottom:8}}>(N) = cards due for review today. Zero means no reviews pending — new cards are studied automatically.</p>

      {view === 'dashboard' && (<>
        <div className="dashboard">
          <div className="stat-card"><h3>Due Now</h3><div className="num num-pink">{reviewDue.length}</div><div className="sub">cards to review</div></div>
          <div className="stat-card"><h3>New</h3><div className="num num-purple">{newCards.length}</div><div className="sub">unseen cards</div></div>
          <div className="stat-card"><h3>Studied</h3><div className="num num-green">{studiedCount}</div><div className="sub">of {questions.length}</div>
            <div className="progress-bar"><div className="progress-fill green" style={{width:`${(studiedCount/questions.length)*100}%`}}></div></div>
          </div>
          <div className="stat-card"><h3>Accuracy</h3><div className="num num-amber">{accuracy}%</div><div className="sub">last {recentResults.length < 100 ? recentResults.length : 100} reviews</div></div>
        </div>

        <div className="card">
          <h3 style={{marginBottom:12,color:'#9388c0'}}>Question Types</h3>
          <div className="filter-pills">
            {Object.entries(TYPE_LABELS).map(([key, label]) => {
              const count = questions.filter(q => q.type === key).length;
              if (!count) return null;
              return <button key={key} className={`pill ${activeTypes.has(key) ? 'active' : ''}`}
                onClick={() => { const n = new Set(activeTypes); n.has(key) ? n.delete(key) : n.add(key); setActiveTypes(n); }}>
                {label} ({count})
              </button>;
            })}
          </div>
          <label style={{display:'flex',justifyContent:'space-between',alignItems:'center',color:'#cbd5e1',padding:'8px 0'}}>
            <span>Cards per session</span>
            <span style={{display:'flex',alignItems:'center',gap:8}}>
              <input type="range" min="5" max="50" step="5" value={batchSize} onChange={e => setBatchSize(+e.target.value)} />
              <span style={{color:'#a855f7',fontWeight:600,width:30}}>{batchSize}</span>
            </span>
          </label>
        </div>

        {Object.keys(stats.byType || {}).length > 0 && (
          <div className="card">
            <h3 style={{marginBottom:16,color:'#9388c0'}}>Accuracy by Type</h3>
            {[
              ['kanji_reading','漢字読み'],['vocabulary','文脈'],['synonym','類義語'],
              ['usage','用法'],['grammar','文法 (Q)'],['mixed','総合'],
              ['vocab','Vocabulary'],['grammar_pattern','Grammar'],['grammar_mcq','Grammar MCQ']
            ].filter(([k]) => stats.byType[k]).map(([key, label]) => {
              const d = stats.byType[key];
              const acc = d.reviews > 0 ? Math.round(d.correct / d.reviews * 100) : 0;
              const color = acc >= 80 ? 'linear-gradient(90deg,#16a34a,#4ade80)' : acc >= 60 ? 'linear-gradient(90deg,#d97706,#fbbf24)' : 'linear-gradient(90deg,#dc2626,#f87171)';
              return (
                <div key={key} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{color:'#cbd5e1',fontSize:'0.9rem'}}>{label}</span>
                    <span style={{color:'#9388c0',fontSize:'0.85rem'}}>{acc}% <span style={{color:'#3e3870'}}>({d.reviews} reviews)</span></span>
                  </div>
                  <div className="progress-bar"><div className="progress-fill" style={{width:`${acc}%`,background:color}}></div></div>
                </div>
              );
            })}
          </div>
        )}

        <div className="card">
          <h3 style={{marginBottom:12,color:'#9388c0'}}>Content</h3>
          <p style={{color:'#5f5890',fontSize:'0.9rem',lineHeight:1.6}}>
            <strong style={{color:'#ede8ff'}}>{questions.length}</strong> practice questions with verified answers<br/>
            <strong style={{color:'#ede8ff'}}>{vocabulary.length}</strong> N2 vocabulary words with definitions<br/>
            <strong style={{color:'#ede8ff'}}>{grammarList.length}</strong> grammar patterns with examples
          </p>
        </div>

        <div className="keyboard-hint" style={{marginTop:16}}>
          <kbd>1</kbd>-<kbd>4</kbd> answer &nbsp; <kbd>Space</kbd> flip / next &nbsp; <kbd>Enter</kbd> continue
        </div>
      </>)}

      {view === 'quiz' && sessionCards[currentIdx] && (() => {
        const card = sessionCards[currentIdx];
        return (<>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span className="card-type">{TYPE_LABELS[card.type] || card.type}</span>
            <span style={{color:'#5f5890',fontSize:'0.85rem'}}>
              {currentIdx + 1}/{sessionCards.length}
              {sessionStats.total > 0 && ` ・ ${Math.round(sessionStats.correct/sessionStats.total*100)}%`}
            </span>
          </div>
          <div className="progress-bar"><div className="progress-fill pink" style={{width:`${(currentIdx/sessionCards.length)*100}%`}}></div></div>
          <div className="card">
            <SentenceDisplay sentence={card.sentence} target={card.target} selected={selected} card={card} isCorrect={selected !== null && selected === shuffledOptions.correctIdx} />
            <div className="options">
              {shuffledOptions.options.map((opt, i) => {
                let cls = 'option-btn';
                if (selected !== null) {
                  if (i === shuffledOptions.correctIdx) cls += ' correct';
                  else if (i === selected && i !== shuffledOptions.correctIdx) cls += ' wrong';
                }
                return (
                  <button key={i} className={cls} onClick={() => handleAnswer(i)} disabled={selected !== null}>
                    <span className="key">{i + 1}</span><span>{opt}</span>
                  </button>
                );
              })}
            </div>
            {selected !== null && selected !== shuffledOptions.correctIdx &&
              (card.type === 'kanji_reading' || card.type === 'vocabulary') && (
              <div className="jisho-hint">
                {jishoMeaning === 'loading' && <div className="definition" style={{color:'#5f5890'}}>Looking up…</div>}
                {jishoMeaning && jishoMeaning !== 'loading' && <div className="definition">{jishoMeaning}</div>}
                <a href={`https://jisho.org/search/${encodeURIComponent(card.type === 'kanji_reading' ? card.target : card.options[card.correct])}`} target="_blank" rel="noopener noreferrer">
                  Look up on Jisho →
                </a>
              </div>
            )}
          </div>
          {selected !== null && (
            <div style={{textAlign:'center'}}>
              <button className="continue-btn" onClick={nextCard}>
                {currentIdx + 1 >= sessionCards.length ? 'Finish' : 'Next'} &rarr;
              </button>
              {lastReviewSnapshot && (
                <button onClick={undoReview} style={{marginLeft:8,padding:'10px 20px',border:'1px solid #353180',background:'transparent',color:'#9388c0',borderRadius:8,cursor:'pointer',fontSize:'0.9rem',fontWeight:600}}>
                  ↩ Undo
                </button>
              )}
              <div className="keyboard-hint"><kbd>Space</kbd> or <kbd>Enter</kbd></div>
            </div>
          )}
        </>);
      })()}

      {view === 'vocab' && sessionCards[currentIdx] && (() => {
        const card = sessionCards[currentIdx];
        return (<>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
            <span className="card-type">Vocabulary</span>
            <span style={{color:'#5f5890',fontSize:'0.85rem'}}>{currentIdx + 1}/{sessionCards.length}</span>
          </div>
          <div className="progress-bar"><div className="progress-fill purple" style={{width:`${(currentIdx/sessionCards.length)*100}%`}}></div></div>
          <div className="flashcard" onClick={() => setFlipped(f => !f)}>
            <div className="word">{card.word}</div>
            {flipped && card.reading && <div className="reading">{card.reading}</div>}
            {flipped && (card.en
              ? <div className="meaning">{card.en}</div>
              : <a className="jisho-link" href={`https://jisho.org/search/${encodeURIComponent(card.word)}`} target="_blank" rel="noopener noreferrer">Look up on Jisho →</a>
            )}
            {!flipped && <div className="hint">Click or press Space to reveal</div>}
          </div>
          {flipped && (<>
            <div className="rating-btns">
              <button className="rating-btn again" onClick={() => handleVocabRating(0)}><kbd style={{marginRight:4,opacity:.7}}>1</kbd> Again</button>
              <button className="rating-btn hard" onClick={() => handleVocabRating(1)}><kbd style={{marginRight:4,opacity:.7}}>2</kbd> Hard</button>
              <button className="rating-btn good" onClick={() => handleVocabRating(2)}><kbd style={{marginRight:4,opacity:.7}}>3</kbd> Good</button>
              <button className="rating-btn easy" onClick={() => handleVocabRating(3)}><kbd style={{marginRight:4,opacity:.7}}>4</kbd> Easy</button>
            </div>
            <div className="keyboard-hint">Rate with <kbd>1</kbd>-<kbd>4</kbd></div>
          </>)}
        </>);
      })()}

      {view === 'grammar' && sessionCards[currentIdx] && (() => {
        const card = sessionCards[currentIdx];
        return (<>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
            <span className="card-type">Grammar</span>
            <span style={{color:'#5f5890',fontSize:'0.85rem'}}>{currentIdx + 1}/{sessionCards.length}</span>
          </div>
          <div className="progress-bar"><div className="progress-fill purple" style={{width:`${(currentIdx/sessionCards.length)*100}%`}}></div></div>
          <div className="grammar-card" style={{cursor: flipped ? 'default' : 'pointer'}} onClick={() => !flipped && setFlipped(true)}>
            <div className="grammar-pattern">{card.pattern}</div>
            {flipped ? (<>
              <div className="grammar-meaning">{card.meaning}</div>
              {card.connection && <div className="grammar-connection">{card.connection}</div>}
              {card.examples.length > 0 && (
                <ul className="grammar-examples">{card.examples.map((ex, i) => <li key={i}>{ex}</li>)}</ul>
              )}
            </>) : (
              <div style={{color:'#3e3870',fontSize:'0.85rem',marginTop:12}}>Click or press Space to reveal</div>
            )}
          </div>
          {flipped ? (<>
            <div className="rating-btns">
              <button className="rating-btn again" onClick={() => handleGrammarRating(0)}><kbd style={{marginRight:4,opacity:.7}}>1</kbd> Again</button>
              <button className="rating-btn hard" onClick={() => handleGrammarRating(1)}><kbd style={{marginRight:4,opacity:.7}}>2</kbd> Hard</button>
              <button className="rating-btn good" onClick={() => handleGrammarRating(2)}><kbd style={{marginRight:4,opacity:.7}}>3</kbd> Good</button>
              <button className="rating-btn easy" onClick={() => handleGrammarRating(3)}><kbd style={{marginRight:4,opacity:.7}}>4</kbd> Easy</button>
            </div>
            <div className="keyboard-hint">Rate with <kbd>1</kbd>-<kbd>4</kbd></div>
          </>) : (
            <div className="keyboard-hint"><kbd>Space</kbd> or <kbd>Enter</kbd> to reveal</div>
          )}
        </>);
      })()}

      {view === 'session_complete' && (
        <div className="session-complete">
          <div className="emoji">{sessionStats.total > 0 && sessionStats.correct/sessionStats.total >= 0.8 ? '🎉' : sessionStats.correct/sessionStats.total >= 0.5 ? '💪' : '📚'}</div>
          <h2>Session Complete!</h2>
          <div className="stats">
            {sessionStats.total > 0 && <p>{sessionStats.correct}/{sessionStats.total} correct ({Math.round(sessionStats.correct/sessionStats.total*100)}%)</p>}
            <p style={{marginTop:8}}>{studiedCount}/{questions.length} questions studied overall</p>
          </div>
          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
            <button className="continue-btn" onClick={() => startQuiz('due')}>Study More</button>
            <button className="continue-btn" style={{background:'#353180'}} onClick={() => setView('dashboard')}>Dashboard</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
